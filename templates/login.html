{% extends 'layout/common_layout.html' %}
{% block title %} 투개더 로그인 {% endblock %}
{% block css %}
<link rel="stylesheet" href="{{url_for('static', filename='css/login.css')}}">
<link rel="stylesheet" href="{{url_for('static', filename='css/common_modal.css')}}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{% endblock %}

{% block content %}
  <div class="logo-container">
    <img src="{{url_for('static', filename='img/togater_log(none_back).png')}}" class="main-logo" alt="메인 로고">
  </div>

  <div class="contents-container">
    <form action="/login" method="POST" class="login-inp-container">
      <input type="text" inputmode="numeric" name="order_number" class="order-number" placeholder="네이버 주문번호" required>
      <button type="button" class="btn-help" id="btn-open-modal">주문번호 확인 방법 ⓘ</button>
      <button type="submit" class="login-btn">
        인증 및 로그인 <img src="{{url_for('static', filename='svg/dog_foot.svg')}}" class="text-icon btn-paw">
      </button>
    </form>

    <div class="bef-reservation-container">
      <div class="reservation-divider">아직 예약 전이신가요?</div>
      <a href="https://smartstore.naver.com/haru_space/products/13141237083" class="sub-btn reservation-link"><i class="fas fa-calendar-alt"></i>실시간 예약 바로가기</a>
      <div class="sub-btn question-btn" id="btn-open-faq"><i class="fas fa-question-circle"></i>자주하는 질문 확인</div>
    </div>
  </div>
  
  {% include 'layout/modal_layout.html' %}
{% endblock %}

{% block script %}
  <script src="{{url_for('static', filename='js/common_modal.js')}}"></script>
{% endblock %}
