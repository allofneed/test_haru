{% extends 'layout/modal_layout.html' %}
{% block modal_id %}checkwaynum-modal{% endblock %}

{% block modal_header %}
  <h3>주문 번호 확인 방법</h3>

  <div class="tab-menu">
    <button type="button" class="tab-btn active" data-tab="pc-way">PC</button>
    <button type="button" class="tab-btn" data-tab="mobile-way">모바일</button>
  </div>
{% endblock %}

{% block modal_content %}
  <div id="pc-way" class="tab-content active">
    pc 방법 영상 넣기
  </div>

  <div id="mobile-way" class="tab-content">
    <video width="100%" autoplay muted loop playsinline>
      <source src="{{ url_for('static', filename='video/mobile-guid.mp4')}}" type="video/mp4">
      브라우저가 비디오 태그를 지원하지 않습니다.
    </video>
  </div>
{% endblock %}
